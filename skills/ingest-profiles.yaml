# Source-type routing for raw → wiki-synthesize.
profiles:
  memex:
    match: "raw/_posts/memex/**"
    voice: own
    mode: reference
    wiki_skill: null
    max_theme_updates: 0
    twin_eligible: false

  posts_origin_apple_notes:
    match: "raw/_posts/origin-apple-notes/**"
    voice: own
    mode: reference
    wiki_skill: null
    max_theme_updates: 0
    twin_eligible: false

  posts:
    match: "raw/_posts/**"
    voice: own
    mode: synthesize
    wiki_skill: skills/wiki-synthesize.md
    max_theme_updates: 2
    twin_eligible: false
    split_strategy: semantic_then_chunk
    chunk_lines: 400

  apple_notes:
    match: "raw/origin-apple-notes/**"
    voice: own
    mode: synthesize
    wiki_skill: skills/wiki-synthesize.md
    max_theme_updates: 2
    twin_eligible: true

  twitter:
    match: "raw/twitter/**"
    voice: external
    mode: reference
    wiki_skill: null
    max_theme_updates: 0
    twin_eligible: false
    chunk_lines: 400
